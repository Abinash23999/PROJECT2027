<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Photo Viewer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }
        
        .photo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Keeps full image visible */
        }
    </style>

</head>

<body>

    <div class="photo-container">
        <img src="LOVE.jpeg" alt="Full Photo">
    </div>

</body>

</html>
